spring:
  application:
    name: smartdesk-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/smartdesk_db}
    # Accept both the documented DATABASE_* names and the legacy DB_* names
    # already used by this project's .env file.
    username: ${DATABASE_USER:${DB_USERNAME:postgres}}
    password: ${DATABASE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

jwt:
  secret: ${JWT_SECRET:smartdesk_super_secret_key_needs_to_be_long_enough_for_hs256_alg_which_is_256_bits}
  expiration: ${JWT_EXPIRATION:3600000}

resend:
  api:
    key: ${RESEND_API_KEY:re_123456789}
  from:
    email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

gemini:
  api:
    key: ${GEMINI_API_KEY:gemini_fake_key_123}
    model: ${GEMINI_MODEL:gemini-3.1-flash-lite}
    fallback-model: ${GEMINI_FALLBACK_MODEL:gemini-3.1-flash-lite}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

frontend:
  url: ${FRONTEND_URL:http://localhost:4200}
