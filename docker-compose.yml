version: '3.8'
services:
  db:
    image: postgres:15
    container_name: smartdesk_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartdesk_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: smartdesk_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/smartdesk_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
