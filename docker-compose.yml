services:
  db:
    image: postgres:15
    container_name: smartdesk_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-smartdesk_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: smartdesk_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${DB_NAME:-smartdesk_db}
      DATABASE_USER: ${DB_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.smartdeskcloud.com}
    ports:
      # Production Nginx proxies to host port 8081.
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
